<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una Flor Para Ti</title>

    <link rel="stylesheet" href="flor.css">
</head>
<body>

    <div class="background-glow"></div>

    <main class="container">

        <h1 id="title">
            🌱 Toca la semilla para hacer florecer nuestro amor
        </h1>

        <div id="plant-container">

            <div id="plant" class="plant">
                ●
            </div>

            <div id="ground" class="ground hidden">
                🟫🟫🟫🟫🟫
            </div>

        </div>

        <p id="message">
            Cada historia comienza con algo pequeño.
        </p>

    </main>

    <div id="petals-container"></div>

    <!-- Música -->
    <audio id="music" loop>
        <source src="music/flor.mp3" type="audio/mpeg">
    </audio>

    <script src="flor.js"></script>

</body>
</html>
