<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños Mi Vida</title>

<link rel="stylesheet" href="dibujo.css">
</head>
<body>

<div class="background"></div>

<button id="music-btn" class="music-btn">
🎵 Activar Música
</button>

<main class="container">

    <img
        src="dibujo.png"
        alt="Dibujo para Yulissa"
        class="drawing"
    >

    <div class="message">

        <h1>Feliz cumpleaños, mi Vida.</h1>

        <p>
            Quizá no haya pastel,
            pero sí una hamburguesa para celebrar
            a la mujer más especial de mi universo,
            que es más de cositas saladas,
            quizás por eso te gusto.
        </p>

        <p class="love">
            Te amo mucho mi Yulissa. 🩵
        </p>

    </div>

</main>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="dibujo.js"></script>

</body>
</html>
