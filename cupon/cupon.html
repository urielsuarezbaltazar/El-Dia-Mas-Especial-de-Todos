<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupón Dermapen</title>

    <link rel="stylesheet" href="cupon.css">
</head>
<body>

    <div id="snow-container"></div>

    <main class="container">

        <h1>❄️ Cupón Especial ❄️</h1>

        <div class="gift-area">

            <img
                src="cupon.png"
                alt="Cupón Dermapen"
                class="ticket">

            <img
                src="osito.gif"
                alt="Osito apenado"
                class="bear">

        </div>

        <div class="message-box">

            <p>
                Aquí iba a poner la marca del Dermapen que quiero regalarte,
                pero aún estoy buscando el mejor para mi bebé.
            </p>

            <p>
                Te lo daré, beibi. 🩵
            </p>

        </div>

        <button id="claim-btn">
             Reclamar cupón
        </button>

        <div id="reward-box" class="reward hidden">

            <h2>Vale Canjeable Por:</h2>

            <ul>
                <li>✓ 1 Dermapen futuro</li>
                <li>✓ Besos de dedito</li>
                <li>✓ Mucho amor</li>
                <li>✓ Garantía de que Twilight te llame mama</li>
            </ul>

        </div>

        <button id="music-btn">
            🎵 Activar Música
        </button>

    </main>

    <audio id="music" loop>
        <source src="audio/music.mp3" type="audio/mpeg">
    </audio>

    <script src="cupon.js"></script>

</body>
</html>
